version: '3.8'

services:
  # Optional — AI-05 Phase-3 Human Parsing model catalog / CCFR Phase-2 Appearance
  # Re-ID (Proposed). Not required unless QDRANT_ENABLED=true in server/.env.
  # See docs/design/Design_AI_AppearanceReID.md §12.
  qdrant:
    image: qdrant/qdrant:v1.18.2-unprivileged
    container_name: lts-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./server/storage/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/6333 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: lts-mediamtx
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped

  server:
    build: ./server
    network_mode: host
    ports:
      - "3080:3080"
    env_file: ./server/.env
    volumes:
      - ./server/models:/app/models:ro
      - ./server/storage:/app/storage
    depends_on:
      - mediamtx
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
