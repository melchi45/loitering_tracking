version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    env_file: ./server/.env
    volumes:
      - ./server/models:/app/models:ro
      - ./server/storage:/app/storage
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
